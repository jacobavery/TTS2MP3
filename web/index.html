<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTS2MP3 Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="logo-icon">&#9654;</span>
        <span class="logo-text">TTS2MP3 Studio</span>
      </div>
      <div class="nav-center">
        <span id="chosen-voice-label" class="chosen-voice">No voice selected</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" id="btn-batch" title="Batch Conversion">&#128194;</button>
        <button class="nav-btn" id="btn-audiobook" title="Audiobook Builder">&#128214;</button>
        <button class="nav-btn" id="btn-compare" title="Voice Comparison">&#127911;</button>
        <button class="nav-btn" id="btn-characters" title="Character Voices">&#127917;</button>
        <button class="nav-btn" id="btn-history" title="History">&#128337;</button>
        <button class="nav-btn" id="btn-pronunciation" title="Pronunciation Dictionary">&#128218;</button>
      </div>
    </div>
  </nav>

  <!-- Main Layout -->
  <main class="app-layout">
    <!-- Left: Voice Panel -->
    <aside class="voice-panel">
      <div class="panel-section">
        <input type="text" id="voice-search" class="search-input" placeholder="Search voices...">
      </div>
      <div class="panel-section filter-bar">
        <select id="voice-lang" class="select-input">
          <option value="All">All Languages</option>
        </select>
        <div id="voice-filters" class="filter-pills">
          <button class="filter-pill active" data-gender="All">All</button>
          <button class="filter-pill" data-gender="Female">F</button>
          <button class="filter-pill" data-gender="Male">M</button>
        </div>
        <button class="filter-pill" id="voice-fav-only" title="Favorites only">★</button>
      </div>
      <div class="voice-list-container">
        <div id="voice-list" class="voice-list"></div>
      </div>
    </aside>

    <!-- Right: Content Area -->
    <section class="content-area">
      <!-- Editor -->
      <div id="editor-area" class="editor-area">
        <div class="editor-toolbar">
          <label class="toolbar-btn file-btn">
            Open File
            <input type="file" id="file-input" accept=".txt,.rtf,.epub,.pdf,.md" hidden>
          </label>
          <button class="toolbar-btn" id="paste-text-btn">Paste</button>
          <button class="toolbar-btn" id="clear-text-btn">Clear</button>
          <span id="file-label" class="file-label"></span>
        </div>
        <textarea id="text-editor" class="text-editor" placeholder="Enter text, paste from clipboard, or drag and drop a file here..."></textarea>
        <div class="editor-footer">
          <span id="word-count" class="word-count">0 words · 0 chars · ~0 min audio</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-area">
        <div class="controls-row">
          <div class="control-group">
            <label>Format</label>
            <select id="format-select" class="select-input">
              <option value="MP3">MP3</option>
              <option value="WAV">WAV</option>
              <option value="FLAC">FLAC</option>
              <option value="AAC">AAC</option>
              <option value="M4B">M4B</option>
              <option value="OGG">OGG Vorbis</option>
              <option value="OPUS">Opus</option>
            </select>
          </div>
          <div class="control-group">
            <label>Quality</label>
            <select id="quality-select" class="select-input">
              <option>High (192k)</option>
            </select>
          </div>
        </div>

        <div class="sliders-row">
          <div class="slider-group">
            <label>Speed <span id="speed-val">+0%</span></label>
            <input type="range" id="speed-slider" min="-50" max="50" value="0" class="slider">
          </div>
          <div class="slider-group">
            <label>Pitch <span id="pitch-val">+0Hz</span></label>
            <input type="range" id="pitch-slider" min="-50" max="50" value="0" class="slider">
          </div>
          <div class="slider-group">
            <label>Volume <span id="volume-val">+0%</span></label>
            <input type="range" id="volume-slider" min="-50" max="50" value="0" class="slider">
          </div>
        </div>

        <div class="options-row">
          <label class="checkbox-label">
            <input type="checkbox" id="normalize-text"> Normalize text
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="normalize-audio"> Normalize audio
          </label>
          <div class="control-group inline">
            <label>Para pause</label>
            <select id="para-pause" class="select-input small">
              <option value="0">None</option>
              <option value="0.5">Short (0.5s)</option>
              <option value="1" selected>Medium (1s)</option>
              <option value="2">Long (2s)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <button class="btn-convert" id="convert-btn">Convert to Audio</button>
      </div>

      <!-- Progress -->
      <div id="progress-area" class="progress-area hidden">
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">Ready</span>
      </div>

      <!-- Audio Player -->
      <div id="audio-player" class="audio-player hidden">
        <button id="player-play" class="player-btn">▶</button>
        <input type="range" id="player-seek" class="player-seek" min="0" max="100" value="0" step="0.1">
        <span id="player-time" class="player-time">0:00 / 0:00</span>
        <a id="player-download" class="player-download" href="#" download>Download</a>
      </div>
    </section>
  </main>

  <!-- Status Bar -->
  <footer class="status-bar">
    <span id="status-voices">Loading...</span>
    <span id="status-cache">Cache: –</span>
    <span id="status-ffmpeg">–</span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
